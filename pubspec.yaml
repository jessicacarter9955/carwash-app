name: carwash_pro
description: CarWash Pro - On-demand car pickup and wash service
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  supabase_flutter: ^2.5.0
  go_router: ^13.2.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_fonts: ^6.2.1
  firebase_core: ^2.27.0
  firebase_messaging: ^14.9.0
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  uuid: ^4.4.0
  cached_network_image: ^3.3.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/