name: washgo
description: WashGo car wash booking app
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  provider: ^6.1.1
  
  # Backend
  supabase_flutter: ^2.8.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  
  # Notifications
  flutter_local_notifications: ^17.2.4
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^2.2.2          # ← Back to 2.2.2 (compatible with android 3.x)
  flutter_compass: ^0.8.0
  
  # UI
  google_fonts: ^6.1.0
  intl: ^0.18.1
  
  # Routing
  go_router: ^12.1.3
  
  # HTTP
  http: ^1.1.2
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Payment
  flutter_stripe: ^10.0.0
  url_launcher: ^6.2.0

dependency_overrides:
  app_links: 3.5.1
  geolocator: 11.0.0
  geolocator_android: 5.0.2
  geolocator_apple: 2.3.13
  geolocator_platform_interface: 4.2.6
  geocoding: 2.2.2                      # ← Keep at 2.2.2
  geocoding_android: 3.3.1             # ← Back to 3.3.1 (compatible with geocoding 2.x)
  geocoding_platform_interface: 3.2.0  # ← Match geocoding 2.x requirement

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets: